<!DOCTYPE html>
<html>
<head>
  <title>My Files</title>

  <style>
    body{
      font-family: Arial;
      background:#111;
      color:white;
      padding:40px;
    }

    h1{
      color:#00ffcc;
    }

    a{
      display:block;
      margin:10px 0;
      color:#66ccff;
      text-decoration:none;
      font-size:18px;
    }

    a:hover{
      color:white;
    }

    .file{
      background:#1e1e1e;
      padding:12px;
      border-radius:10px;
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<h1>Downloads</h1>

<div id="files"></div>

<script>
async function loadFiles() {

  const username = "Logic-Legend-Ranveer";
  const repo = "public-files";
  const folder = "files";

  const url =
  `https://api.github.com/repos/${username}/${repo}/contents/${folder}`;

  const response = await fetch(url);
  const data = await response.json();

  const filesDiv = document.getElementById("files");

  data.forEach(file => {

    const link = document.createElement("a");

    link.href = file.download_url;
    link.textContent = file.name;
    link.target = "_blank";

    const div = document.createElement("div");
    div.className = "file";

    div.appendChild(link);

    filesDiv.appendChild(div);
  });
}

loadFiles();
</script>

</body>
</html>
